<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelword - Piksel Dünyası</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #f3f4f6; /* Siyah alanlar yok, temiz açık gri */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Tuval Alanı */
        #canvas-container {
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            cursor: grab; 
            background-color: #f3f4f6;
            position: relative;
        }
        #canvas-container:active { cursor: grabbing; }
        
        /* 100x100 TAM KARE HARİTA ALANI */
        #pixel-canvas {
            display: grid;
            grid-template-columns: repeat(100, 8px); /* Kareler 8px */
            grid-template-rows: repeat(100, 8px);
            width: 800px;  /* 100 * 8px = 800px tam kare genişlik */
            height: 800px; /* 100 * 8px = 800px tam kare yükseklik */
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform-origin: center center;
            will-change: transform;
            transition: background-image 0.15s ease;
        }
        
        /* Kare Ayarları */
        .pixel {
            width: 8px;
            height: 8px;
            box-sizing: border-box;
            background-color: #ffffff;
        }
        .pixel:hover { filter: brightness(0.9); cursor: pointer; }
        
        /* Arayüz Elemanları (Senin Orijinal Alt Paletin) */
        #ui-layer {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex;
            flex-direction: column; align-items: center; gap: 15px;
            pointer-events: none; z-index: 10;
        }
        .interactive { pointer-events: auto; }
        
        /* Orijinal Renk Paleti Tasarımın */
        #palette {
            display: flex;
            gap: 10px; background: #fff;
            padding: 12px 20px; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 3px solid #000;
        }
        .color-box {
            width: 32px;
            height: 32px; border-radius: 50%;
            cursor: pointer; border: 3px solid transparent;
            box-sizing: border-box; transition: transform 0.1s;
        }
        .color-box:hover { transform: scale(1.15); }
        .color-box.selected { border-color: #000; transform: scale(1.2); }

        /* Zamanlayıcı Butonu */
        #timer-btn {
            background: #EF4444;
            color: white; border: 3px solid #000;
            padding: 12px 35px; font-weight: bold; font-size: 20px;
            border-radius: 8px; box-shadow: 0 5px 0 #000;
            display: none; font-family: sans-serif;
        }
        #timer-btn.waiting { background: #4B5563; box-shadow: 0 2px 0 #000; transform: translateY(3px); }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="pixel-canvas"></div>
    </div>

    <div id="ui-layer">
        <button id="timer-btn" class="waiting">5s</button>
        <div id="palette" class="interactive">
            <div class="color-box selected" style="background: #000000;" data-color="#000000"></div>
            <div class="color-box" style="background: #ffffff; border: 2px solid #ccc;" data-color="#ffffff"></div>
            <div class="color-box" style="background: #e63946;" data-color="#e63946"></div>
            <div class="color-box" style="background: #4cc9f0;" data-color="#4cc9f0"></div>
            <div class="color-box" style="background: #2a9d8f;" data-color="#2a9d8f"></div>
            <div class="color-box" style="background: #e9c46a;" data-color="#e9c46a"></div>
            <div class="color-box" style="background: #f4a261;" data-color="#f4a261"></div>
            <div class="color-box" style="background: #a2d2ff;" data-color="#a2d2ff"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs7K-wI_wYmZ7kX2_7Bf9X9_z3KzW3zYc",
            authDomain: "pixelword-a7c1b.firebaseapp.com",
            projectId: "pixelword-a7c1b",
            storageBucket: "pixelword-a7c1b.appspot.com",
            messagingSenderId: "1064972304859",
            appId: "1:1064972304859:web:06FkZmMwYjgtN2Q1ZC00YzBmLWE1NDktOWViMGYwMTZhZkZk"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const canvas = document.getElementById('pixel-canvas');
        const timerBtn = document.getElementById('timer-btn');
        let selectedColor = '#000000';
        let canPlacePixel = true;
        let countdown = 5;

        // Sürükleme esnasında yanlışlıkla piksel boyanmasını önlemek için durum kontrolü
        let isMoving = false;

        // 1. Haritayı Kurma (10.000 Kare)
        for (let i = 0; i < 10000; i++) {
            const pixel = document.createElement('div');
            pixel.classList.add('pixel');
            pixel.dataset.id = i; 
            
            pixel.addEventListener('click', async () => {
                // Eğer kullanıcı şu an haritayı sürüklüyorsa boyama yapma
                if (isMoving) return;
                if (!canPlacePixel) return;

                const pixelId = pixel.dataset.id;
                startCooldown(); 

                try {
                    await setDoc(doc(db, "pikseller", "kare_" + pixelId), {
                        renk: selectedColor,
                        zaman: new Date().toISOString()
                    });
                } catch (e) {
                    console.error("Hata:", e);
                }
            });
            canvas.appendChild(pixel);
        }

        // 2. Canlı Firebase Dinleme
        for (let i = 0; i < 10000; i++) {
            onSnapshot(doc(db, "pikseller", "kare_" + i), (docSnap) => {
                if (docSnap.exists()) {
                    const veri = docSnap.data();
                    const hedefPixel = canvas.querySelector(`[data-id="${i}"]`);
                    if (hedefPixel) {
                        hedefPixel.style.backgroundColor = veri.renk || "#ffffff";
                    }
                }
            });
        }

        // 3. Cooldown Sistemi
        function startCooldown() {
            canPlacePixel = false;
            countdown = 5;
            timerBtn.style.display = 'block';
            timerBtn.innerText = `${countdown}s`;

            const interval = setInterval(() => {
                countdown--;
                timerBtn.innerText = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(interval);
                    canPlacePixel = true;
                    timerBtn.style.display = 'none';
                }
            }, 1000);
        }

        // 4. Palet Seçim Kontrolü
        const colorBoxes = document.querySelectorAll('.color-box');
        colorBoxes.forEach(box => {
            box.addEventListener('click', () => {
                document.querySelector('.color-box.selected').classList.remove('selected');
                box.classList.add('selected');
                selectedColor = box.dataset.color;
            });
        });

        // 5. GELİŞMİŞ SÜRÜKLEME (DRAG) VE AKILLI ZOOM SİSTEMİ
        const container = document.getElementById('canvas-container');
        
        function getMinScale() {
            const canvasSize = 800; // 100 kare * 8px = 800px
            const minScaleX = window.innerWidth / canvasSize;
            const minScaleY = window.innerHeight / canvasSize;
            return Math.min(minScaleX, minScaleY) * 0.95; 
        }

        let scale = Math.max(1.5, getMinScale()); 
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() {
            const minScale = getMinScale();
            if (scale < minScale) scale = minScale; 
            if (scale > 6) scale = 6; // Maksimum yakınlaşma sınırı

            // Çizgilerin küçülünce tamamen yok olmasını sağlayan dinamik kontrol
            if (scale < 1.35) {
                canvas.style.backgroundImage = "none";
            } else {
                canvas.style.backgroundImage = `
                    linear-gradient(#e5e7eb 1px, transparent 1px),
                    linear-gradient(90deg, #e5e7eb 1px, transparent 1px)
                `;
                canvas.style.backgroundSize = "8px 8px";
            }

            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        updateTransform();

        // Zoom (Tekerlek) Kontrolü
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.0015;
            updateTransform();
        }, { passive: false });

        // Fare ile Tutup Sürükleme Özelliği
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            isMoving = false; // Tıklama başlangıcında hareket etmiyor olarak ayarla
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            // Fare bırakıldığında ufak bir gecikmeyle boyama kilidini kaldırıyoruz
            setTimeout(() => { isMoving = false; }, 50);
        });

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            isMoving = true; // Sürükleme yapıldığını belirt, boyama tetiklenmesin
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        // Mobil Dokunmatik Ekran Sürükleme Desteği
        container.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) return;
            isDragging = true;
            isMoving = false;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        });
        window.addEventListener('touchend', () => {
            isDragging = false;
            setTimeout(() => { isMoving = false; }, 50);
        });
        container.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length > 1) return;
            isMoving = true;
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            updateTransform();
        });

        window.addEventListener('resize', () => {
            updateTransform();
        });
    </script>
</body>
</html>
