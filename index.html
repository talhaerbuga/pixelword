<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelword - Profesyonel Yuvarlak Renk Çarkı</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        /* Tuval Alanı */
        #canvas-container {
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            cursor: grab; background: #111;
        }
        #canvas-container:active { cursor: grabbing; }
        #pixel-canvas {
            display: grid;
            grid-template-columns: repeat(100, 20px);
            grid-template-rows: repeat(100, 20px);
            background-color: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transform-origin: center center;
        }
        .pixel {
            width: 20px; height: 20px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            box-sizing: border-box;
            background-color: #ffffff;
        }
        .pixel:hover { filter: brightness(0.85); cursor: pointer; }
        
        /* Arayüz Elemanları */
        #ui-layer {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); display: flex;
            flex-direction: column; align-items: center; gap: 20px;
            pointer-events: none; z-index: 10;
        }
        .interactive { pointer-events: auto; }
        
        /* GERÇEK YUVARLAK RENK ÇARKI */
        .wheel-container {
            position: relative;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px;
            border-radius: 50%;
            border: 3px solid #000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #color-wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            list-style: none;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        /* Çarkın Dilimleri (12 Renk Segmenti) */
        .color-slice {
            overflow: hidden;
            position: absolute;
            top: 0; right: 0;
            width: 50%; height: 50%;
            transform-origin: 0% 100%;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .color-slice:hover { filter: brightness(1.2); }
        .color-slice.selected { filter: brightness(1.3) contrast(1.2); border: 2px solid #000; z-index: 5; }

        /* Her bir dilimin dönüş açısı ve rengi (30'ar derece) */
        .slice-1  { transform: rotate(0deg) skewY(-60deg); background: #FFD300; }
        .slice-2  { transform: rotate(30deg) skewY(-60deg); background: #97C701; }
        .slice-3  { transform: rotate(60deg) skewY(-60deg); background: #019D00; }
        .slice-4  { transform: rotate(90deg) skewY(-60deg); background: #00ACAD; }
        .slice-5  { transform: rotate(120deg) skewY(-60deg); background: #0088F5; }
        .slice-6  { transform: rotate(150deg) skewY(-60deg); background: #001391; }
        .slice-7  { transform: rotate(180deg) skewY(-60deg); background: #7F00FF; }
        .slice-8  { transform: rotate(210deg) skewY(-60deg); background: #FF00FF; }
        .slice-9  { transform: rotate(240deg) skewY(-60deg); background: #FF007F; }
        .slice-10 { transform: rotate(270deg) skewY(-60deg); background: #FF0000; }
        .slice-11 { transform: rotate(30deg) skewY(-60deg); background: #FF7F00; }
        .slice-12 { transform: rotate(330deg) skewY(-60deg); background: #FFFFA1; }

        /* Çarkın Merkezindeki Siyah-Beyaz Göbek Alanı */
        .center-circle {
            position: absolute;
            width: 55px; height: 55px;
            background: white;
            border-radius: 50%;
            z-index: 10;
            border: 3px solid #000;
            display: flex;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }
        .center-color {
            width: 50%; height: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .center-color:hover { opacity: 0.8; }
        .center-color.selected { border: 2px solid #000; box-sizing: border-box; }

        /* Zamanlayıcı Butonu */
        #timer-btn {
            background: #EF4444; color: white; border: 3px solid #000;
            padding: 12px 35px; font-weight: bold; font-size: 20px;
            border-radius: 8px; box-shadow: 0 5px 0 #000;
            display: none; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="pixel-canvas"></div>
    </div>

    <div id="ui-layer">
        <button id="timer-btn" class="waiting">5s</button>
        
        <div class="wheel-container interactive">
            <ul id="color-wheel">
                <li class="color-slice slice-1 selected" data-color="#FFD300"></li>
                <li class="color-slice slice-2" data-color="#97C701"></li>
                <li class="color-slice slice-3" data-color="#019D00"></li>
                <li class="color-slice slice-4" data-color="#00ACAD"></li>
                <li class="color-slice slice-5" data-color="#0088F5"></li>
                <li class="color-slice slice-6" data-color="#001391"></li>
                <li class="color-slice slice-7" data-color="#7F00FF"></li>
                <li class="color-slice slice-8" data-color="#FF00FF"></li>
                <li class="color-slice slice-9" data-color="#FF007F"></li>
                <li class="color-slice slice-10" data-color="#FF0000"></li>
                <li class="color-slice slice-11" data-color="#FF7F00"></li>
                <li class="color-slice slice-12" data-color="#FFFFA1"></li>
            </ul>
            <div class="center-circle">
                <div class="center-color" style="background: #ffffff;" data-color="#ffffff"></div>
                <div class="center-color" style="background: #000000;" data-color="#000000"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs7K-wI_wYmZ7kX2_7Bf9X9_z3KzW3zYc",
            authDomain: "pixelword-a7c1b.firebaseapp.com",
            projectId: "pixelword-a7c1b",
            storageBucket: "pixelword-a7c1b.appspot.com",
            messagingSenderId: "1064972304859",
            appId: "1:1064972304859:web:06FkZmMwYjgtN2Q1ZC00YzBmLWE1NDktOWViMGYwMTZhZkZk"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const canvas = document.getElementById('pixel-canvas');
        const timerBtn = document.getElementById('timer-btn');
        let selectedColor = '#FFD300'; 
        let canPlacePixel = true;
        let countdown = 5;

        // 1. 100x100 Haritayı Ekrana Çizme (10.000 Kare)
        for (let i = 0; i < 10000; i++) {
            const pixel = document.createElement('div');
            pixel.classList.add('pixel');
            pixel.dataset.id = i; 
            
            pixel.addEventListener('click', async () => {
                if (!canPlacePixel) return;

                const pixelId = pixel.dataset.id;
                startCooldown();

                try {
                    await setDoc(doc(db, "pikseller", "kare_" + pixelId), {
                        renk: selectedColor,
                        zaman: new Date().toISOString()
                    });
                } catch (e) {
                    console.error("Piksel iletilemedi:", e);
                }
            });

            canvas.appendChild(pixel);
        }

        // 2. Canlı Dinleme Altyapısı
        for (let i = 0; i < 10000; i++) {
            onSnapshot(doc(db, "pikseller", "kare_" + i), (docSnap) => {
                if (docSnap.exists()) {
                    const veri = docSnap.data();
                    const hedefPixel = canvas.querySelector(`[data-id="${i}"]`);
                    if (hedefPixel) hedefPixel.style.backgroundColor = veri.renk;
                }
            });
        }

        // 3. 5 Saniye Geri Sayım Kilidi
        function startCooldown() {
            canPlacePixel = false;
            countdown = 5;
            timerBtn.style.display = 'block';
            timerBtn.innerText = `${countdown}s`;

            const interval = setInterval(() => {
                countdown--;
                timerBtn.innerText = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(interval);
                    canPlacePixel = true;
                    timerBtn.style.display = 'none';
                }
            }, 1000);
        }

        // 4. Yuvarlak Palet Renk Değişimi Kontrolü
        const allColors = document.querySelectorAll('.color-slice, .center-color');
        allColors.forEach(box => {
            box.addEventListener('click', (e) => {
                const currentSelected = document.querySelector('.color-slice.selected, .center-color.selected');
                if (currentSelected) currentSelected.classList.remove('selected');
                
                box.classList.add('selected');
                selectedColor = box.dataset.color;
                e.stopPropagation(); // Tıklamanın diğer elementleri etkilemesini engelle
            });
        });

        // 5. Sürükleme ve Zoom Mekanizması
        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;
        const container = document.getElementById('canvas-container');

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(.2, scale), 4);
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        });

        container.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('pixel')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        });
    </script>
</body>
</html>
</body>
</html>
