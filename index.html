<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelword - Profesyonel Piksel Dünyası</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Tuval Alanı */
        #canvas-container {
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            cursor: grab; background: #111111;
            position: relative;
        }
        #canvas-container:active { cursor: grabbing; }
        
        /* TEMİZ, İNCE ÇİZGİLİ VE KÜÇÜK KARELİ TUVAL */
        #pixel-canvas {
            display: grid;
            grid-template-columns: repeat(100, 10px); /* Kareler 10px'e küçültüldü */
            grid-template-rows: repeat(100, 10px);
            background-color: #ffffff;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            transform-origin: center center;
            will-change: transform;
            
            /* Görseldeki gibi noktasız, temiz ince çizgi ızgarası */
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 10px 10px;
        }
        
        /* Noktaları Kaldırmak İçin Kenarlıkları Sildik */
        .pixel {
            width: 10px;
            height: 10px;
            border: none; /* Köşelerdeki noktaları kaldırmak için border sıfırlandı */
            box-sizing: border-box;
            background-color: transparent; /* Boyanmayan yerler şeffaf kalır, arkadaki temiz çizgiler görünür */
        }
        .pixel:hover { filter: brightness(0.85); cursor: pointer; background-color: rgba(0,0,0,0.1); }
        
        /* SAĞ ÜST KÖŞEDEKİ BÜYÜTÜLMÜŞ ARAYÜZ ALANI */
        #ui-layer-top-right {
            position: absolute; top: 25px; right: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            pointer-events: none; z-index: 10;
        }
        .interactive { pointer-events: auto; }
        
        /* BÜYÜK YUVARLAK RENK ÇARKI */
        .wheel-container {
            position: relative;
            width: 240px; height: 240px;
            background: #ffffff;
            padding: 15px;
            border-radius: 50%;
            border: 4px solid #000000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        #color-wheel {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 50%;
            list-style: none; margin: 0; padding: 0;
            overflow: hidden;
        }
        .color-slice {
            overflow: hidden; position: absolute;
            top: 0; right: 0; width: 50%; height: 50%;
            transform-origin: 0% 100%; cursor: pointer;
        }
        .color-slice:hover { filter: brightness(1.15); }
        .color-slice.selected { filter: brightness(1.25); }

        /* 12 Segmentli Profesyonel Renk Dağılımı */
        .slice-1  { transform: rotate(0deg) skewY(-60deg); background: #FFD300; }   /* Sarı */
        .slice-2  { transform: rotate(30deg) skewY(-60deg); background: #97C701; }  /* Sarı-Yeşil */
        .slice-3  { transform: rotate(60deg) skewY(-60deg); background: #019D00; }  /* Yeşil */
        .slice-4  { transform: rotate(90deg) skewY(-60deg); background: #00ACAD; }  /* Turkuaz */
        .slice-5  { transform: rotate(120deg) skewY(-60deg); background: #0088F5; } /* Açık Mavi */
        .slice-6  { transform: rotate(150deg) skewY(-60deg); background: #001391; } /* Koyu Mavi */
        .slice-7  { transform: rotate(180deg) skewY(-60deg); background: #7F00FF; } /* Mor */
        .slice-8  { transform: rotate(210deg) skewY(-60deg); background: #FF00FF; } /* Macenta */
        .slice-9  { transform: rotate(240deg) skewY(-60deg); background: #FF007F; } /* Pembe */
        .slice-10 { transform: rotate(270deg) skewY(-60deg); background: #FF0000; } /* Kırmızı */
        .slice-11 { transform: rotate(300deg) skewY(-60deg); background: #FF7F00; } /* Turuncu */
        .slice-12 { transform: rotate(330deg) skewY(-60deg); background: #FFFFA1; } /* Açık Sarı */

        /* Çarkın Merkezindeki Siyah-Beyaz Alan */
        .center-circle {
            position: absolute; width: 75px; height: 75px;
            background: white; border-radius: 50%; z-index: 10;
            border: 4px solid #000000; display: flex; overflow: hidden;
        }
        .center-color { width: 50%; height: 100%; cursor: pointer; }
        .center-color:hover { filter: brightness(0.85); }

        /* BÜYÜK ARA RENK TONLARI PANELİ */
        #shade-panel {
            display: flex; gap: 8px; background: #ffffff;
            padding: 12px 18px; border-radius: 14px;
            border: 4px solid #000000; box-shadow: 0 8px 0px #000000;
            width: calc(100% - 36px); justify-content: space-between;
        }
        .shade-box {
            width: 36px; height: 36px; border-radius: 6px;
            cursor: pointer; border: 3px solid transparent; box-sizing: border-box;
            transition: transform(0.1s);
        }
        .shade-box:hover { transform: scale(1.1); }
        .shade-box.selected { border-color: #000000; box-shadow: inset 0 0 0 2px #fff; transform: scale(1.15); }

        /* Alt Orta Geri Sayım Butonu */
        #timer-btn {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); pointer-events: none; z-index: 10;
            background: #ef4444; color: white; border: 3px solid #000000;
            padding: 12px 35px; font-weight: bold; font-size: 22px;
            border-radius: 8px; box-shadow: 0 5px 0px #000000; display: none;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="pixel-canvas"></div>
    </div>

    <button id="timer-btn">5s</button>

    <div id="ui-layer-top-right">
        <div class="wheel-container interactive">
            <ul id="color-wheel">
                <li class="color-slice slice-1" data-color="#FFD300"></li>
                <li class="color-slice slice-2" data-color="#97C701"></li>
                <li class="color-slice slice-3" data-color="#019D00"></li>
                <li class="color-slice slice-4" data-color="#00ACAD"></li>
                <li class="color-slice slice-5" data-color="#0088F5"></li>
                <li class="color-slice slice-6" data-color="#001391"></li>
                <li class="color-slice slice-7" data-color="#7F00FF"></li>
                <li class="color-slice slice-8" data-color="#FF00FF"></li>
                <li class="color-slice slice-9" data-color="#FF007F"></li>
                <li class="color-slice slice-10" data-color="#FF0000"></li>
                <li class="color-slice slice-11" data-color="#FF7F00"></li>
                <li class="color-slice slice-12" data-color="#FFFFA1"></li>
            </ul>
            <div class="center-circle">
                <div class="center-color" style="background: #ffffff;" data-color="#ffffff"></div>
                <div class="center-color" style="background: #000000;" data-color="#000000"></div>
            </div>
        </div>

        <div id="shade-panel" class="interactive">
            <div class="shade-box" id="shade-1"></div>
            <div class="shade-box" id="shade-2"></div>
            <div class="shade-box" id="shade-3"></div>
            <div class="shade-box" id="shade-4"></div>
            <div class="shade-box" id="shade-5"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
[cite: 32]        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Senin Canlı Firebase Bağlantın
        const firebaseConfig = {
            apiKey: "AIzaSyAs7K-wI_wYmZ7kX2_7Bf9X9_z3KzW3zYc",
            authDomain: "pixelword-a7c1b.firebaseapp.com",
            projectId: "pixelword-a7c1b",
            storageBucket: "pixelword-a7c1b.appspot.com",
            messagingSenderId: "1064972304859",
[cite: 33]            appId: "1:1064972304859:web:06FkZmMwYjgtN2Q1ZC00YzBmLWE1NDktOWViMGYwMTZhZkZk"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

[cite: 34]        const canvas = document.getElementById('pixel-canvas');
        const timerBtn = document.getElementById('timer-btn');
        let selectedColor = '#FF0000'; // Varsayılan başlangıç rengi kırmızı
        let canPlacePixel = true;
        let countdown = 5;

        // 1. 100x100 Haritayı İnşa Etme (10.000 Küçük Kare)
[cite: 35]        for (let i = 0; i < 10000; i++) {
            const pixel = document.createElement('div');
[cite: 36]            pixel.classList.add('pixel');
            pixel.dataset.id = i; 
            
            pixel.addEventListener('click', async () => {
                if (!canPlacePixel) return;

                const pixelId = pixel.dataset.id;
                startCooldown();

                try {
                    await setDoc(doc(db, "pikseller", "kare_" + pixelId), {
                        renk: selectedColor,
[cite: 37]                        zaman: new Date().toISOString()
                    });
                } catch (e) {
[cite: 38]                    console.error("Hata:", e);
                }
            });

[cite: 39]            canvas.appendChild(pixel);
        }

        // 2. Anlık Senkronizasyon (Firebase Canlı Dinleme)
[cite: 40]        for (let i = 0; i < 10000; i++) {
            onSnapshot(doc(db, "pikseller", "kare_" + i), (docSnap) => {
                if (docSnap.exists()) {
                    const veri = docSnap.data();
                    const hedefPixel = canvas.querySelector(`[data-id="${i}"]`);
                    // Veritabanında renk varsa boyar, yoksa şeffaf bırakıp arkadaki ızgara çizgisini gösterir
[cite: 41]                    if (hedefPixel) {
                        hedefPixel.style.backgroundColor = veri.renk || "transparent";
                    }
                }
            });
        }

        // 3. 5 Saniye Kilidi
        function startCooldown() {
            canPlacePixel = false;
[cite: 43]            countdown = 5;
            timerBtn.style.display = 'block';
            timerBtn.innerText = `${countdown}s`;

            const interval = setInterval(() => {
                countdown--;
                timerBtn.innerText = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(interval);
[cite: 44]                    canPlacePixel = true;
                    timerBtn.style.display = 'none';
                }
            }, 1000);
        }

        // Tonlama Formülü
        function lampColor(hex, percent) {
            let num = parseInt(hex.replace("#",""),16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        // Ara Renk Seçeneklerini Panelde Gösterme
        function updateShadePanel(baseColor) {
            if(baseColor.toLowerCase() === "#ffffff" || baseColor.toLowerCase() === "#000000") {
                // Siyah veya beyaz seçilirse gri tonları oluştur
                const grays = ["#ffffff", "#aaaaaa", "#777777", "#333333", "#000000"];
                grays.forEach((color, idx) => {
                    const box = document.getElementById(`shade-${idx+1}`);
                    box.style.backgroundColor = color;
                    box.dataset.color = color;
                });
            } else {
                // Renkli tonlar oluştur
                const shades = [
                    lampColor(baseColor, 35),  
                    lampColor(baseColor, 18),  
                    baseColor,                 
                    lampColor(baseColor, -18), 
                    lampColor(baseColor, -35)  
                ];
                shades.forEach((color, idx) => {
                    const box = document.getElementById(`shade-${idx+1}`);
                    box.style.backgroundColor = color;
                    box.dataset.color = color;
                });
            }
            
            // Seçilen ana rengi otomatik aktif et
            document.querySelectorAll('.shade-box').forEach(b => b.classList.remove('selected'));
            const defaultActive = document.getElementById('shade-3');
            defaultActive.classList.add('selected');
            selectedColor = defaultActive.dataset.color;
        }

        // Ana Çark Tıklaması
        const mainColors = document.querySelectorAll('.color-slice, .center-color');
        mainColors.forEach(el => {
            el.addEventListener('click', (e) => {
                const base = el.dataset.color;
                updateShadePanel(base);
                e.stopPropagation();
            });
        });

        // Ara Ton Tıklaması
        const shadeBoxes = document.querySelectorAll('.shade-box');
        shadeBoxes.forEach(box => {
            box.addEventListener('click', () => {
                document.querySelectorAll('.shade-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedColor = box.dataset.color;
            });
        });

        // İlk açılış tonları (Kırmızı)
        updateShadePanel("#FF0000");

        // 5. Sürükleme ve Yakınlaştırma (Zoom) Kontrolleri
        let scale = 1.5; // Küçük karelerde daha rahat görmek için ilk açılış ölçeğini 1.5 yaptık
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;
        const container = document.getElementById('canvas-container');
        canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.0015;
            scale = Math.min(Math.max(.2, scale), 6); // Maksimum 6 kat yakınlaşma
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }, { passive: false });

[cite: 50]        container.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('pixel')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

[cite: 51]        window.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        });

        // Telefon/Mobil Kaydırma Desteği
        container.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('pixel') || e.touches.length > 1) return;
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        });
        window.addEventListener('touchend', () => isDragging = false);
        container.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length > 1) return;
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        });
    </script>
</body>
</html>
