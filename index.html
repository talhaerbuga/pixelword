<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelword - Profesyonel Piksel Dünyası</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #f3f4f6; /* Temiz açık gri arka plan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Tuval Alanı */
        #canvas-container {
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            cursor: grab; background-color: #f3f4f6;
            position: relative;
        }
        #canvas-container:active { cursor: grabbing; }
        
        /* 100x100 TAM KARE VE KÜÇÜK HARİTA ALANI */
        #pixel-canvas {
            display: grid;
            grid-template-columns: repeat(100, 8px); /* Kareler 8px */
            grid-template-rows: repeat(100, 8px);
            width: 800px;  /* 100 * 8px = 800px tam kare genişlik */
            height: 800px; /* 100 * 8px = 800px tam kare yükseklik */
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform-origin: center center;
            will-change: transform;
            transition: background-image 0.2s ease; /* Çizgiler kaybolurken yumuşak geçiş yapar */
        }
        
        /* Kare Ayarları */
        .pixel {
            width: 8px;
            height: 8px;
            box-sizing: border-box;
            background-color: #ffffff; /* Boş pikseller varsayılan olarak beyaz */
        }
        .pixel:hover { filter: brightness(0.9); cursor: pointer; }
        
        /* SAĞ ÜST KÖŞEDEKİ BÜYÜK GELİŞMİŞ RENK ARAYÜZÜ */
        #ui-layer-top-right {
            position: absolute; top: 25px; right: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            pointer-events: none; z-index: 10;
        }
        .interactive { pointer-events: auto; }
        
        /* BÜYÜK YUVARLAK RENK ÇARKI */
        .wheel-container {
            position: relative;
            width: 240px; height: 240px;
            background: #ffffff;
            padding: 15px;
            border-radius: 50%;
            border: 4px solid #000000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
        }
        #color-wheel {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 50%;
            list-style: none; margin: 0; padding: 0;
            overflow: hidden;
        }
        .color-slice {
            overflow: hidden; position: absolute;
            top: 0; right: 0; width: 50%; height: 50%;
            transform-origin: 0% 100%; cursor: pointer;
        }
        .color-slice:hover { filter: brightness(1.15); }
        .color-slice.selected { filter: brightness(1.25); }

        /* 12 Segmentli Profesyonel Renk Dağılımı */
        .slice-1  { transform: rotate(0deg) skewY(-60deg); background: #FFD300; }   
        .slice-2  { transform: rotate(30deg) skewY(-60deg); background: #97C701; }  
        .slice-3  { transform: rotate(60deg) skewY(-60deg); background: #019D00; }  
        .slice-4  { transform: rotate(90deg) skewY(-60deg); background: #00ACAD; }  
        .slice-5  { transform: rotate(120deg) skewY(-60deg); background: #0088F5; } 
        .slice-6  { transform: rotate(150deg) skewY(-60deg); background: #001391; } 
        .slice-7  { transform: rotate(180deg) skewY(-60deg); background: #7F00FF; } 
        .slice-8  { transform: rotate(210deg) skewY(-60deg); background: #FF00FF; } 
        .slice-9  { transform: rotate(240deg) skewY(-60deg); background: #FF007F; } 
        .slice-10 { transform: rotate(270deg) skewY(-60deg); background: #FF0000; } 
        .slice-11 { transform: rotate(300deg) skewY(-60deg); background: #FF7F00; } 
        .slice-12 { transform: rotate(330deg) skewY(-60deg); background: #FFFFA1; } 

        /* Çarkın Merkezindeki Siyah-Beyaz Alan */
        .center-circle {
            position: absolute; width: 75px; height: 75px;
            background: white; border-radius: 50%; z-index: 10;
            border: 4px solid #000000; display: flex; overflow: hidden;
        }
        .center-color { width: 50%; height: 100%; cursor: pointer; }
        .center-color:hover { filter: brightness(0.85); }

        /* BÜYÜK ARA RENK TONLARI PANELİ */
        #shade-panel {
            display: flex; gap: 8px; background: #ffffff;
            padding: 12px 18px; border-radius: 14px;
            border: 4px solid #000000; box-shadow: 0 8px 0px #000000;
            width: calc(100% - 36px); justify-content: space-between;
        }
        .shade-box {
            width: 36px; height: 36px; border-radius: 6px;
            cursor: pointer; border: 3px solid transparent; box-sizing: border-box;
            transition: transform 0.1s;
        }
        .shade-box:hover { transform: scale(1.1); }
        .shade-box.selected { border-color: #000000; box-shadow: inset 0 0 0 2px #fff; transform: scale(1.15); }

        /* Alt Orta Geri Sayım Butonu */
        #timer-btn {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); pointer-events: none; z-index: 10;
            background: #ef4444; color: white; border: 3px solid #000000;
            padding: 12px 35px; font-weight: bold; font-size: 22px;
            border-radius: 8px; box-shadow: 0 5px 0px #000000; display: none;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="pixel-canvas"></div>
    </div>

    <button id="timer-btn">5s</button>

    <div id="ui-layer-top-right">
        <div class="wheel-container interactive">
            <ul id="color-wheel">
                <li class="color-slice slice-1" data-color="#FFD300"></li>
                <li class="color-slice slice-2" data-color="#97C701"></li>
                <li class="color-slice slice-3" data-color="#019D00"></li>
                <li class="color-slice slice-4" data-color="#00ACAD"></li>
                <li class="color-slice slice-5" data-color="#0088F5"></li>
                <li class="color-slice slice-6" data-color="#001391"></li>
                <li class="color-slice slice-7" data-color="#7F00FF"></li>
                <li class="color-slice slice-8" data-color="#FF00FF"></li>
                <li class="color-slice slice-9" data-color="#FF007F"></li>
                <li class="color-slice slice-10" data-color="#FF0000"></li>
                <li class="color-slice slice-11" data-color="#FF7F00"></li>
                <li class="color-slice slice-12" data-color="#FFFFA1"></li>
            </ul>
            <div class="center-circle">
                <div class="center-color" style="background: #ffffff;" data-color="#ffffff"></div>
                <div class="center-color" style="background: #000000;" data-color="#000000"></div>
            </div>
        </div>

        <div id="shade-panel" class="interactive">
            <div class="shade-box" id="shade-1"></div>
            <div class="shade-box" id="shade-2"></div>
            <div class="shade-box" id="shade-3"></div>
            <div class="shade-box" id="shade-4"></div>
            <div class="shade-box" id="shade-5"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs7K-wI_wYmZ7kX2_7Bf9X9_z3KzW3zYc",
            authDomain: "pixelword-a7c1b.firebaseapp.com",
            projectId: "pixelword-a7c1b",
            storageBucket: "pixelword-a7c1b.appspot.com",
            messagingSenderId: "1064972304859",
            appId: "1:1064972304859:web:06FkZmMwYjgtN2Q1ZC00YzBmLWE1NDktOWViMGYwMTZhZkZk"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const canvas = document.getElementById('pixel-canvas');
        const timerBtn = document.getElementById('timer-btn');
        let selectedColor = '#FF0000'; 
        let canPlacePixel = true;
        let countdown = 5;

        // 1. Haritayı İnşa Etme
        for (let i = 0; i < 10000; i++) {
            const pixel = document.createElement('div');
            pixel.classList.add('pixel');
            pixel.dataset.id = i; 
            
            pixel.addEventListener('click', async () => {
                if (!canPlacePixel) return;

                const pixelId = pixel.dataset.id;
                startCooldown();

                try {
                    await setDoc(doc(db, "pikseller", "kare_" + pixelId), {
                        renk: selectedColor,
                        zaman: new Date().toISOString()
                    });
                } catch (e) {
                    console.error("Hata:", e);
                }
            });

            canvas.appendChild(pixel);
        }

        // 2. Canlı Firebase Dinleme
        for (let i = 0; i < 10000; i++) {
            onSnapshot(doc(db, "pikseller", "kare_" + i), (docSnap) => {
                if (docSnap.exists()) {
                    const veri = docSnap.data();
                    const hedefPixel = canvas.querySelector(`[data-id="${i}"]`);
                    if (hedefPixel) {
                        hedefPixel.style.backgroundColor = veri.renk || "#ffffff";
                    }
                }
            });
        }

        // 3. Cooldown Geri Sayımı
        function startCooldown() {
            canPlacePixel = false;
            countdown = 5;
            timerBtn.style.display = 'block';
            timerBtn.innerText = `${countdown}s`;

            const interval = setInterval(() => {
                countdown--;
                timerBtn.innerText = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(interval);
                    canPlacePixel = true;
                    timerBtn.style.display = 'none';
                }
            }, 1000);
        }

        // Tonlama Sihirbazı
        function lampColor(hex, percent) {
            let num = parseInt(hex.replace("#",""),16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        // Alt Paleti Güncelleme Fonksiyonu
        function updateShadePanel(baseColor) {
            if(baseColor.toLowerCase() === "#ffffff" || baseColor.toLowerCase() === "#000000") {
                const grays = ["#ffffff", "#aaaaaa", "#777777", "#333333", "#000000"];
                grays.forEach((color, idx) => {
                    const box = document.getElementById(`shade-${idx+1}`);
                    box.style.backgroundColor = color;
                    box.dataset.color = color;
                });
            } else {
                const shades = [
                    lampColor(baseColor, 35),  
                    lampColor(baseColor, 18),  
                    baseColor,                 
                    lampColor(baseColor, -18), 
                    lampColor(baseColor, -35)  
                ];
                shades.forEach((color, idx) => {
                    const box = document.getElementById(`shade-${idx+1}`);
                    box.style.backgroundColor = color;
                    box.dataset.color = color;
                });
            }
            
            document.querySelectorAll('.shade-box').forEach(b => b.classList.remove('selected'));
            const defaultActive = document.getElementById('shade-3');
            defaultActive.classList.add('selected');
            selectedColor = defaultActive.dataset.color;
        }

        // Tıklama Dinleyicileri
        const mainColors = document.querySelectorAll('.color-slice, .center-color');
        mainColors.forEach(el => {
            el.addEventListener('click', (e) => {
                const base = el.dataset.color;
                updateShadePanel(base);
                e.stopPropagation();
            });
        });

        const shadeBoxes = document.querySelectorAll('.shade-box');
        shadeBoxes.forEach(box => {
            box.addEventListener('click', () => {
                document.querySelectorAll('.shade-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedColor = box.dataset.color;
            });
        });

        updateShadePanel("#FF0000");

        // 5. GELİŞMİŞ DRAG, ZOOM VE DİNAMİK ÇİZGİ SİLME SİSTEMİ
        const container = document.getElementById('canvas-container');
        
        function getMinScale() {
            const canvasSize = 800; // 800px genişlik
            const minScaleX = window.innerWidth / canvasSize;
            const minScaleY = window.innerHeight / canvasSize;
            return Math.min(minScaleX, minScaleY) * 0.95; 
        }

        let scale = Math.max(1.5, getMinScale()); 
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() {
            const minScale = getMinScale();
            if (scale < minScale) scale = minScale; 
            if (scale > 6) scale = 6; 

            // DİNAMİK ÇİZGİ KONTROLÜ: Ekranı uzaklaştırdıkça çizgileri tamamen kapatır
            // Yakınlaştığında (scale > 1.35) çizgiler geri gelir, küçülttüğünde yok olur
            if (scale < 1.35) {
                canvas.style.backgroundImage = "none";
            } else {
                canvas.style.backgroundImage = `
                    linear-gradient(#e5e7eb 1px, transparent 1px),
                    linear-gradient(90deg, #e5e7eb 1px, transparent 1px)
                `;
                canvas.style.backgroundSize = "8px 8px";
            }

            canvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        updateTransform();

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.0015;
            updateTransform();
        }, { passive: false });

        container.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('pixel')) return; 
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        // Mobil Dokunmatik Ekranlar
        container.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('pixel') || e.touches.length > 1) return;
            isDragging = true;
            startX = e.touches[0].clientX - translateX;
            startY = e.touches[0].clientY - translateY;
        });
        window.addEventListener('touchend', () => isDragging = false);
        container.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length > 1) return;
            translateX = e.touches[0].clientX - startX;
            translateY = e.touches[0].clientY - startY;
            updateTransform();
        });

        window.addEventListener('resize', () => {
            updateTransform();
        });
    </script>
</body>
</html>
